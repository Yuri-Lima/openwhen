<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open your letter — OpenWhen</title>
  <meta name="description" content="Someone sent you a letter on OpenWhen. Download the app to read it when it unlocks.">
  <meta name="theme-color" content="#C0392B">
  <link rel="icon" href="/favicon.ico" sizes="16x16 32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="You received a letter on OpenWhen">
  <meta property="og:description" content="Someone wrote you a letter. Download the app and sign in to read it when it unlocks.">
  <meta property="og:image" content="https://openwhen.live/images/og.png">
  <style>
    :root {
      --bg: #F7F4F0;
      --card: #FFFFFF;
      --ink: #1A1714;
      --ink-soft: #6B6560;
      --accent: #C0392B;
      --accent-dark: #A93226;
      --border: #EDE8E3;
      --shadow: rgba(26,23,20,0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1714;
        --card: #252018;
        --ink: #F5F0EB;
        --ink-soft: #B8B0A8;
        --accent: #E74C3C;
        --accent-dark: #C0392B;
        --border: rgba(255,255,255,0.06);
        --shadow: rgba(0,0,0,0.3);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .seal {
      width: 64px;
      height: 64px;
      background-color: var(--accent);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(231,76,60,0.3);
      margin-bottom: 24px;
    }
    .seal span {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 18px;
      color: #F5F0EB;
      letter-spacing: -0.3px;
    }
    .brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 32px;
      letter-spacing: -0.3px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px var(--shadow);
      padding: 36px 28px;
      margin-bottom: 24px;
    }
    .envelope-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .subtitle {
      font-size: 15px;
      color: var(--ink-soft);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .store-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      background-color: var(--accent);
      color: #F5F0EB;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(231,76,60,0.25);
    }
    .store-btn:hover {
      background-color: var(--accent-dark);
      transform: translateY(-1px);
    }
    .store-btn svg { width: 20px; height: 20px; fill: #F5F0EB; }
    .hint {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.5;
    }
    .hint a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .footer a {
      color: var(--ink-soft);
      text-decoration: none;
    }
  </style>
  <script>
    // Try to open the app via universal/app link automatically
    (function() {
      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var path = window.location.pathname;

      if (isIOS) {
        // iOS universal links should have already intercepted if app is installed.
        // If we reached here, app is not installed — show the page.
      } else if (isAndroid) {
        // Try intent-based deep link
        var intentUrl = 'intent://openwhen.live' + path +
          '#Intent;scheme=https;package=com.openwhen.app;end';
        window.location.replace(intentUrl);
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="seal"><span>OW</span></div>
    <div class="brand">OpenWhen</div>

    <div class="card">
      <div class="envelope-icon">&#x1F48C;</div>
      <h1>You have a letter waiting</h1>
      <p class="subtitle">
        Someone sent you a letter on OpenWhen.<br>
        Download the app and sign in with your email to read it when it unlocks.
      </p>
      <div class="store-buttons">
        <a href="https://apps.apple.com/app/openwhen/id6743217190" class="store-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11"/></svg>
          App Store
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.openwhen.app" class="store-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 1.33a1 1 0 010 1.724l-2.302 1.33-2.533-2.192 2.533-2.192zM5.864 3.457L16.8 9.79l-2.302 2.302-8.635-8.635z"/></svg>
          Google Play
        </a>
      </div>
    </div>

    <p class="hint">
      Already have the app? <a href="https://openwhen.live">Open OpenWhen</a>
    </p>

    <div class="footer">
      <p>&copy; 2026 OpenWhen &middot; Write today. Feel tomorrow.</p>
      <p style="margin-top:4px;">
        <a href="/privacy.html">Privacy</a> &middot; <a href="/terms.html">Terms</a>
      </p>
    </div>
  </div>
</body>
</html>
