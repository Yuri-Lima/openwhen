name: openwhen
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^21.0.0

  # State management
  flutter_riverpod: ^3.0.0

  # Navigation
  go_router: ^17.0.0

  # Utils
  intl: ^0.20.0
  uuid: ^4.3.0
  equatable: ^2.0.5
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  