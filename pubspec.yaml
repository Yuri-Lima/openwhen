name: openwhen
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^21.0.0

  # State management
  flutter_riverpod: ^3.0.0

  # Navigation
  go_router: ^17.0.0

  # Utils
  intl: ^0.20.0
  uuid: ^4.3.0
  equatable: ^2.0.5
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  record: ^6.0.0
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  cloud_functions: ^6.1.0
  pdf: ^3.12.0
  archive: ^4.0.9
  http: ^1.2.2
  path: ^1.9.1
  flutter_svg: ^2.2.3
  firebase_analytics: ^12.2.0
  timezone: ^0.11.0
  app_links: ^7.0.0
  firebase_app_check: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.0+1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#EDE5D8"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  adaptive_icon_foreground_inset: 16
  remove_alpha_ios: true
  background_color_ios: "#EDE5D8"
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#EDE5D8"
    theme_color: "#C0392B"
  windows:
    generate: true
    image_path: assets/branding/app_icon.png
  macos:
    generate: true
    image_path: assets/branding/app_icon.png
